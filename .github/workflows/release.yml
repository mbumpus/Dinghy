name: Release

# Builds each platform's installer on its native OS and attaches the
# artifacts to the GitHub release for the pushed tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Node 20 action runtime is deprecated June 2026; opt into Node 24 now
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build installer (x64)
        run: npx electron-builder --x64 --publish never

      - name: Build installer (arm64, macOS only)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --arm64 --publish never

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.exe
