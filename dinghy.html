<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Dinghy</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d29922;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 52px;
  }
  header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
  .tabs { display: flex; gap: 0.4rem; }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.35rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.12s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .tab:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }

  /* Main layout */
  main {
    padding: 1rem;
    height: calc(100vh - 52px);
    overflow: hidden;
  }
  .panel { display: none; height: 100%; }
  .panel.active { display: block; }

  /* Workspace - 3 columns, desktop optimized */
  .workspace {
    display: grid;
    grid-template-columns: 300px 1fr 380px;
    gap: 1rem;
    height: 100%;
    align-items: stretch;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card-header {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .card-body {
    padding: 1rem;
    overflow-y: auto;
    flex: 1;
  }
  .card-body.no-pad { padding: 0; }

  /* Form elements */
  label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
    margin-top: 0.6rem;
    font-weight: 500;
  }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.45rem 0.6rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea {
    resize: none;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.82rem;
    line-height: 1.6;
    flex: 1;
    min-height: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.45rem 0.9rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn.secondary:hover { background: var(--border); }
  .btn.danger { background: var(--danger); }
  .btn.danger:hover { background: #ff7b72; }
  .btn.success { background: var(--success); }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.78rem; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 0.75rem;
  }
  .drop-zone:hover { border-color: var(--accent); }
  .drop-zone.dragover { border-color: var(--accent); background: rgba(88,166,255,0.05); }
  .drop-zone p { font-size: 0.85rem; color: var(--text); }
  .drop-zone .hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
  input[type="file"] { display: none; }

  /* Canvas */
  .canvas-wrap {
    position: relative;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 0;
  }
  canvas {
    display: block;
    cursor: crosshair;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .canvas-placeholder {
    color: var(--text-muted);
    text-align: center;
    padding: 4rem 2rem;
  }
  .canvas-placeholder p { font-size: 1rem; margin-bottom: 0.5rem; }
  .canvas-placeholder .hint { font-size: 0.85rem; }

  /* Item list */
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
    font-size: 0.82rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.12s;
  }
  .item:hover { border-color: var(--accent); }
  .item.active-item { border-color: var(--accent); background: rgba(88,166,255,0.08); }
  .item-name { font-weight: 600; font-size: 0.85rem; }
  .item-type { color: var(--text-muted); font-size: 0.75rem; margin-top: 0.1rem; }
  .item-actions { display: flex; gap: 0.3rem; }
  .item-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.15rem 0.35rem;
    border-radius: 4px;
    line-height: 1;
  }
  .item-actions button:hover { color: var(--danger); background: rgba(248,81,73,0.1); }

  /* YAML panel specific */
  .yaml-card {
    display: flex;
    flex-direction: column;
  }
  .yaml-card .card-body {
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  .yaml-card textarea {
    border: none;
    border-radius: 0;
    padding: 1rem;
    background: var(--bg);
    flex: 1;
    min-height: 0;
  }
  .yaml-card .card-footer {
    padding: 0.6rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }

  /* Section divider */
  .section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 1rem 0 0.4rem;
    font-weight: 700;
  }

  /* Camera builder */
  .cam-grid {
    display: grid;
    grid-template-columns: 340px 1fr 380px;
    gap: 1rem;
    height: 100%;
    align-items: stretch;
  }
  .cam-form .card-body { display: flex; flex-direction: column; gap: 0.1rem; }
  .cam-list .item-list { flex: 1; overflow-y: auto; }
  .checkbox-row {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }
  .checkbox-row label {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    margin: 0;
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 400;
  }
  .yaml-output {
    background: var(--bg);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    white-space: pre-wrap;
    overflow-x: auto;
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
  }

  /* Inline validation (spec 02) */
  .field-error {
    color: var(--danger);
    font-size: 0.75rem;
    margin-top: 0.25rem;
    display: none;
  }
  .field-error.visible { display: block; }
  .field-warn {
    color: var(--warning);
    font-size: 0.75rem;
    margin-top: 0.25rem;
    display: none;
  }
  .field-warn.visible { display: block; }

  /* Camera tab strip (spec 08) */
  .cam-tabs {
    display: none;
    gap: 0.35rem;
    padding: 0.45rem 0.6rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .cam-tabs.visible { display: flex; }
  .cam-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.25rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.76rem;
    white-space: nowrap;
  }
  .cam-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .cam-tab.add { border-style: dashed; }
  .cam-tab:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }

  /* Import + assign (specs 06/08) */
  #importText { min-height: 90px; font-size: 0.75rem; }
  .assign-select {
    margin-top: 0.3rem;
    font-size: 0.72rem !important;
    padding: 0.2rem 0.4rem !important;
    width: auto !important;
  }
  .scope-select {
    width: auto !important;
    font-size: 0.72rem !important;
    padding: 0.15rem 0.4rem !important;
  }
  .banner {
    display: none;
    padding: 0.5rem 1rem;
    font-size: 0.78rem;
    border-bottom: 1px solid var(--border);
  }
  .banner.visible { display: block; }
  .banner.warn { color: var(--warning); background: rgba(210,153,34,0.08); }

  /* Toast with undo (spec 02) */
  #toast {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    visibility: hidden;
    transform: translateX(-50%) translateY(calc(100% + 1.5rem));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    font-size: 0.82rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    transition: transform 0.18s ease;
    z-index: 100;
  }
  #toast.visible { visibility: visible; transform: translateX(-50%) translateY(0); }
  #toast button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
  }

  /* Responsive - mobile fallback */
  @media (max-width: 1200px) {
    .workspace { grid-template-columns: 260px 1fr 320px; }
    .cam-grid { grid-template-columns: 300px 1fr 320px; }
  }
  @media (max-width: 900px) {
    body { overflow: auto; }
    main { height: auto; overflow: auto; padding: 0.75rem; }
    .workspace, .cam-grid {
      grid-template-columns: 1fr;
      height: auto;
    }
    .card { min-height: 300px; }
    .canvas-wrap { min-height: 50vh; }
    header { height: auto; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <h1 style="display:flex;align-items:center;gap:0.5rem">
    <img src="dinghy.png" alt="" style="height:28px;border-radius:6px" onerror="this.style.display='none'">
    Dinghy
    <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">gets you into Frigate</span>
  </h1>
  <div class="tabs">
    <button class="tab active" onclick="UI.switchTab('editor', this)">Mask / Zone Editor</button>
    <button class="tab" onclick="UI.switchTab('cameras', this)">Camera Builder</button>
  </div>
</header>

<main>

<!-- EDITOR PANEL -->
<div id="panel-editor" class="panel active">
  <div class="workspace">
    <!-- Left: Controls & Items -->
    <div class="card">
      <div class="card-header"><h3>Controls</h3></div>
      <div class="card-body">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <p>Drop, click, or Ctrl+V to paste</p>
          <p class="hint">Use Frigate debug view screenshot</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="UI.handleFile(this.files)">
        <button class="btn secondary btn-sm" id="grabFrameBtn" style="display:none;width:100%;margin-bottom:0.75rem" onclick="UI.grabFrame()">📷 Grab Frame from RTSP</button>
        <div id="ffmpegStatus" style="display:none;font-size:0.75rem;line-height:1.5;margin:-0.35rem 0 0.75rem"></div>

        <label>Drawing Mode</label>
        <select id="drawMode" onchange="UI.changeMode()">
          <option value="motion_mask">Motion Mask</option>
          <option value="object_filter_mask">Object Filter Mask</option>
          <option value="zone">Zone</option>
        </select>

        <div id="objectTypeWrap" style="display:none">
          <label>Object Type</label>
          <select id="objectType">
            <option value="all">all objects</option>
            <option value="person">person</option>
            <option value="car">car</option>
            <option value="dog">dog</option>
            <option value="cat">cat</option>
            <option value="bird">bird</option>
            <option value="package">package</option>
          </select>
        </div>

        <label>Name</label>
        <input type="text" id="shapeName" placeholder="e.g. driveway">
        <div class="field-error" id="nameError"></div>

        <div class="btn-row" style="margin-top:0.6rem">
          <button class="btn" onclick="UI.finishPolygon()">Close</button>
          <button class="btn secondary btn-sm" onclick="Store.undoPoint()">Undo</button>
          <button class="btn danger btn-sm" onclick="Store.clearCurrent()">Clear</button>
        </div>
        <div class="field-error" id="drawError"></div>
        <div class="field-warn" id="drawWarn"></div>

        <div class="section-title" style="cursor:pointer" onclick="UI.toggleImport()">Import YAML <span id="importChevron">▸</span></div>
        <div id="importWrap" style="display:none">
          <textarea id="importText" rows="5" placeholder="Paste config.yml or a snippet with zones / motion / objects…"></textarea>
          <div class="btn-row" style="margin-top:0.4rem">
            <button class="btn btn-sm" onclick="UI.importYaml()">Import</button>
            <button class="btn secondary btn-sm" onclick="document.getElementById('importFile').click()">From file…</button>
          </div>
          <input type="file" id="importFile" accept=".yml,.yaml" onchange="UI.importYamlFile(this.files)">
          <div class="field-error" id="importError"></div>
          <div id="importWarnings" style="font-size:0.75rem;color:var(--warning);margin-top:0.3rem"></div>
        </div>

        <div class="section-title">Created Items</div>
        <div class="item-list" id="itemList" style="flex:1; overflow-y:auto; max-height:300px;"></div>
        <div class="btn-row" style="margin-top:0.5rem">
          <button class="btn secondary btn-sm" onclick="UI.clearAll()">Delete All</button>
          <button class="btn danger btn-sm" onclick="UI.clearAllData()">Clear All Data</button>
        </div>
      </div>
    </div>

    <!-- Center: Large Canvas -->
    <div class="card" style="padding:0">
      <div class="cam-tabs" id="camTabs"></div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-placeholder" id="placeholder">
          <p>Upload an image to start</p>
          <p class="hint">Drag &amp; drop a frame from your camera feed</p>
        </div>
        <canvas id="editorCanvas" style="display:none"></canvas>
      </div>
    </div>

    <!-- Right: Live YAML -->
    <div class="card yaml-card">
      <div class="card-header">
        <h3>Live YAML</h3>
        <select id="yamlScope" class="scope-select" onchange="UI.changeYamlScope()">
          <option value="camera">This camera</option>
          <option value="all">All cameras</option>
        </select>
      </div>
      <div class="banner warn" id="yamlBanner"></div>
      <div class="card-body">
        <textarea id="yamlOut" readonly placeholder="YAML will appear here as you draw..."></textarea>
      </div>
      <div class="card-footer">
        <button class="btn btn-sm" onclick="UI.copyYaml()">Copy</button>
        <button class="btn secondary btn-sm" onclick="UI.downloadYaml()">Download</button>
      </div>
    </div>
  </div>
</div>

<!-- CAMERA PANEL -->
<div id="panel-cameras" class="panel">
  <div class="cam-grid">
    <!-- Form -->
    <div class="card cam-form">
      <div class="card-header"><h3>Add Camera</h3></div>
      <div class="card-body">
        <div id="onvifWrap" style="display:none">
          <button class="btn secondary btn-sm" id="discoverBtn" style="width:100%" onclick="OnvifUI.discover()">📡 Discover Cameras (ONVIF)</button>
          <div id="onvifResults" style="margin-top:0.5rem"></div>
          <div class="section-title">or add manually</div>
        </div>
        <label>Camera Name</label>
        <input type="text" id="camName" placeholder="front_door">
        <div class="field-error" id="camNameError"></div>
        <label>Input Path</label>
        <input type="text" id="camInput" placeholder="rtsp://user:pass@192.168.1.100:554/stream">
        <div class="field-error" id="camInputError"></div>
        <label>Detect Width</label>
        <input type="number" id="camWidth" value="1920">
        <label>Detect Height</label>
        <input type="number" id="camHeight" value="1080">
        <label>FPS</label>
        <input type="number" id="camFps" value="5">
        <div class="checkbox-row">
          <label><input type="checkbox" id="roleDetect" checked> detect</label>
          <label><input type="checkbox" id="roleRecord"> record</label>
          <label><input type="checkbox" id="roleRtmp"> rtmp</label>
        </div>
        <label style="margin-top:0.8rem">Tracked Objects (optional)</label>
        <div class="checkbox-row" id="trackedObjectsRow" style="margin-top:0.2rem">
          <label><input type="checkbox" value="person"> person</label>
          <label><input type="checkbox" value="car"> car</label>
          <label><input type="checkbox" value="dog"> dog</label>
          <label><input type="checkbox" value="cat"> cat</label>
          <label><input type="checkbox" value="bird"> bird</label>
          <label><input type="checkbox" value="package"> package</label>
        </div>
        <div class="btn-row" style="margin-top:auto; padding-top:1rem;">
          <button class="btn" onclick="UI.addCamera()">Add Camera</button>
          <button class="btn secondary" onclick="UI.clearCamForm()">Reset</button>
        </div>
      </div>
    </div>

    <!-- List -->
    <div class="card cam-list">
      <div class="card-header"><h3>Cameras</h3></div>
      <div class="card-body">
        <div class="item-list" id="camList"></div>
      </div>
    </div>

    <!-- YAML -->
    <div class="card yaml-card">
      <div class="card-header"><h3>Full Config</h3></div>
      <div class="card-body">
        <div class="yaml-output" id="camYamlOut"></div>
      </div>
      <div class="card-footer">
        <button class="btn btn-sm" onclick="UI.copyCamYaml()">Copy</button>
        <button class="btn secondary btn-sm" onclick="UI.downloadCamYaml()">Download</button>
      </div>
    </div>
  </div>
</div>

</main>

<div id="toast"><span class="toast-msg"></span><button onclick="Toast.undo()">Undo</button></div>

<script id="vendor-jsyaml">
/* Vendored: js-yaml 4.1.0 (MIT) — https://github.com/nodeca/js-yaml
 * Inlined per locked decision D1 to keep this tool single-file and air-gapped.

<script>
'use strict';
/* =====================================================================
 * Frigate Config Builder — v0.2 architecture (spec 01-state-refactor)
 * Namespaces: Store / View / Yaml / Validate / Persist / Platform / UI
 * Normalized coordinates (0–1) are CANONICAL; pixels derived at render.
 * Platform is the only layer the Electron port (v0.3) replaces.
 * ===================================================================== */

// ==================== RUNTIME IMAGES (never persisted) ====================
// Keyed by cameraId. Holds decoded Image + natural dims + source dataURL.
const Images = Object.create(null);

// ==================== STORE ====================
const Store = {
  state: {
    schemaVersion: 3,
    activeCameraId: 'default',
    cameras: [],                       // {id, name, input, width, height, fps, roles, trackedObjects}
    polygonsByCamera: { default: [] }, // {id, name, type, objectType?, points:[{x,y}], closed}
    imagesMeta: {},                    // {cameraId: {w, h, filename}} — dims only, no bytes
    draft: { points: [], type: 'motion_mask' },
    draftsByCamera: {},                // parked drafts for inactive cameras (spec 08)
    yamlScope: 'camera'                // 'camera' snippet | 'all' full config (spec 08)
  },
  _subs: [],
  subscribe(fn) { this._subs.push(fn); },
  _notify() { for (const fn of this._subs) fn(this.state); },

  activePolygons() {
    const s = this.state;
    return s.polygonsByCamera[s.activeCameraId] || (s.polygonsByCamera[s.activeCameraId] = []);
  },

  setImage(dataUrl, meta) {
    const camId = this.state.activeCameraId;
    const img = new Image();
    img.onload = () => {
      Images[camId] = { img, w: img.naturalWidth, h: img.naturalHeight, dataUrl };
      this.state.imagesMeta[camId] = { w: img.naturalWidth, h: img.naturalHeight, filename: (meta && meta.filename) || '' };
      this._notify();
    };
    img.src = dataUrl;
  },
  snapshotImage() {
    const camId = this.state.activeCameraId;
    return Images[camId] ? { camId, dataUrl: Images[camId].dataUrl, meta: { ...this.state.imagesMeta[camId] } } : null;
  },
  restoreImage(snap) {
    if (!snap) return;
    this.state.activeCameraId === snap.camId
      ? this.setImage(snap.dataUrl, { filename: snap.meta.filename })
      : (Images[snap.camId] = null);
  },

  setDraftType(type) {
    this.state.draft.type = type;
    this.state.draft.points = [];
    this._notify();
  },
  addPoint(x, y) {
    this.state.draft.points.push({ x, y });
    this._notify();
  },
  undoPoint() { this.state.draft.points.pop(); this._notify(); },
  clearCurrent() { this.state.draft.points = []; this._notify(); },

  closePolygon(name, objectType) {
    const d = this.state.draft;
    if (d.points.length < 3) return { ok: false, error: 'min_points' };
    this.activePolygons().push({
      id: 'p_' + crypto.randomUUID(),
      name,
      type: d.type,
      objectType: d.type === 'object_filter_mask' ? objectType : undefined,
      points: d.points.slice(),
      closed: true
    });
    d.points = [];
    this._notify();
    return { ok: true };
  },
  deletePolygon(id) {
    const camId = this.state.activeCameraId;
    const polys = this.activePolygons();
    const idx = polys.findIndex(p => p.id === id);
    if (idx === -1) return null;
    const [removed] = polys.splice(idx, 1);
    this._notify();
    return { polygon: removed, index: idx, camId };
  },
  // undo restores into the camera the polygon was deleted from, not whichever is active
  restorePolygon(snap) {
    const polys = (this.state.polygonsByCamera[snap.camId] ??= []);
    polys.splice(Math.min(snap.index, polys.length), 0, snap.polygon);
    this._notify();
  },
  clearPolygons() {
    const camId = this.state.activeCameraId;
    const removed = this.activePolygons().slice();
    this.state.polygonsByCamera[camId] = [];
    this.state.draft.points = [];
    this._notify();
    return { polygons: removed, camId };
  },
  restorePolygons(snap) {
    this.state.polygonsByCamera[snap.camId] = snap.polygons.slice();
    this._notify();
  },

  addCamera(cam) {
    cam.id = 'cam_' + crypto.randomUUID();
    this.state.cameras.push(cam);
    if (!this.state.polygonsByCamera[cam.id]) this.state.polygonsByCamera[cam.id] = [];
    this._notify();
    return cam;
  },
  deleteCamera(id) {
    const idx = this.state.cameras.findIndex(c => c.id === id);
    if (idx === -1) return null;
    const [cam] = this.state.cameras.splice(idx, 1);
    const polygons = this.state.polygonsByCamera[id] || [];
    const meta = this.state.imagesMeta[id];
    delete this.state.polygonsByCamera[id];
    delete this.state.imagesMeta[id];
    delete this.state.draftsByCamera[id];
    delete Images[id];
    if (this.state.activeCameraId === id) {
      // don't carry the deleted camera's draft over to the default tab
      this.state.activeCameraId = 'default';
      this.state.draft = this.state.draftsByCamera.default || { points: [], type: this.state.draft.type };
    }
    this._notify();
    return { camera: cam, index: idx, polygons, meta };
  },
  restoreCamera(snap) {
    this.state.cameras.splice(Math.min(snap.index, this.state.cameras.length), 0, snap.camera);
    this.state.polygonsByCamera[snap.camera.id] = snap.polygons;
    if (snap.meta) this.state.imagesMeta[snap.camera.id] = snap.meta;
    this._notify();
  },

  // ---- spec 05: vertex drag / insert / delete ----
  _drag: null,      // { polyId, index, orig:{x,y} }
  _lastMove: null,  // single-step move undo
  _findPoly(id) { return this.activePolygons().find(p => p.id === id); },
  beginDrag(polyId, index) {
    const poly = this._findPoly(polyId);
    if (!poly) return;
    this._drag = { polyId, index, orig: { ...poly.points[index] } };
  },
  dragTo(x, y) {
    if (!this._drag) return;
    const poly = this._findPoly(this._drag.polyId);
    if (!poly) return;
    poly.points[this._drag.index] = { x: clamp01(x), y: clamp01(y) }; // clamp to image bounds
    this._notify();
  },
  endDrag() {
    if (!this._drag) return;
    this._lastMove = this._drag;
    this._drag = null;
    this._notify();
  },
  cancelDrag() {
    if (!this._drag) return;
    const poly = this._findPoly(this._drag.polyId);
    if (poly) poly.points[this._drag.index] = this._drag.orig;
    this._drag = null;
    this._notify();
  },
  undoLastMove() {
    if (!this._lastMove) return false;
    const poly = this._findPoly(this._lastMove.polyId);
    if (poly && poly.points[this._lastMove.index]) poly.points[this._lastMove.index] = this._lastMove.orig;
    this._lastMove = null;
    this._notify();
    return true;
  },
  insertPoint(polyId, insertIndex, x, y) {
    const poly = this._findPoly(polyId);
    if (!poly) return;
    poly.points.splice(insertIndex, 0, { x: clamp01(x), y: clamp01(y) });
    this._notify();
  },
  deleteVertex(polyId, index) {
    const poly = this._findPoly(polyId);
    if (!poly) return { ok: false };
    if (poly.points.length <= 3) return { ok: false, error: 'min_points' };
    poly.points.splice(index, 1);
    this._notify();
    return { ok: true };
  },

  // ---- spec 04: full reset (Clear All Data) ----
  snapshotState() { return JSON.parse(JSON.stringify(this.state)); },
  reset() {
    this.state = {
      schemaVersion: 3,
      activeCameraId: 'default',
      cameras: [],
      polygonsByCamera: { default: [] },
      imagesMeta: {},
      draft: { points: [], type: document.getElementById('drawMode').value },
      draftsByCamera: {},
      yamlScope: 'camera'
    };
    this._notify();
  },
  setYamlScope(scope) {
    this.state.yamlScope = scope === 'all' ? 'all' : 'camera';
    this._notify();
  },
  hydrate(ws) {
    this.state = ws;
    this._notify();
  },

  // ---- spec 08: multi-camera workspace ----
  setActiveCamera(id) {
    const s = this.state;
    if (s.activeCameraId === id) return;
    s.draftsByCamera[s.activeCameraId] = s.draft; // park draft per camera
    s.activeCameraId = id;
    if (!s.polygonsByCamera[id]) s.polygonsByCamera[id] = [];
    s.draft = s.draftsByCamera[id] || { points: [], type: s.draft.type };
    this._notify();
  },
  movePolygon(polyId, toCameraId) {
    const s = this.state;
    const polys = this.activePolygons();
    const idx = polys.findIndex(p => p.id === polyId);
    if (idx === -1) return;
    const [poly] = polys.splice(idx, 1);
    (s.polygonsByCamera[toCameraId] ??= []).push(poly);
    this._notify();
  },

  // ---- spec 06/08: apply parsed import (merge, rename-on-collision) ----
  applyImport(parsed) {
    const s = this.state;
    const report = { added: 0, renames: [], camerasCreated: [], warnings: parsed.warnings.slice() };
    for (const pc of parsed.cameras) {
      let camId;
      if (pc.name === '(snippet)') {
        camId = s.activeCameraId;
      } else {
        let cam = s.cameras.find(c => c.name === pc.name);
        if (!cam) {
          cam = {
            id: 'cam_' + crypto.randomUUID(),
            name: pc.name,
            input: pc.settings.input || '',
            width: pc.settings.width || 1920,
            height: pc.settings.height || 1080,
            fps: pc.settings.fps || 5,
            roles: pc.settings.roles || ['detect'],
            trackedObjects: pc.settings.track || null
          };
          s.cameras.push(cam);
          s.polygonsByCamera[cam.id] = [];
          report.camerasCreated.push(pc.name);
        }
        camId = cam.id;
      }
      const polys = (s.polygonsByCamera[camId] ??= []);
      const names = new Set(polys.map(p => p.name));
      // only a *loaded* image gives trustworthy dims; stale persisted meta could
      // silently normalize pixel coords against the wrong resolution
      const im = Images[camId];
      const dims = im ? { w: im.w, h: im.h } : null;
      const add = (name, type, objectType, coords) => {
        if (!coords) return;
        let pts = coords.points;
        if (coords.pixelSpace) {
          if (!dims) {
            report.warnings.push(`Skipped ${name || type}: pixel-space coordinates need an image loaded for camera "${pc.name}"`);
            return;
          }
          pts = pts.map(p => ({ x: p.x / dims.w, y: p.y / dims.h }));
          report.warnings.push(`Converted ${name || type} from pixel to normalized coordinates (${dims.w}×${dims.h})`);
        }
        let final = name || `imported_${type}_${polys.length + 1}`;
        if (names.has(final)) {
          let n = 2;
          const base = final;
          while (names.has(final)) final = `${base}_${n++}`;
          report.renames.push(`${base} → ${final}`);
        }
        names.add(final);
        polys.push({ id: 'p_' + crypto.randomUUID(), name: final, type, objectType, points: pts, closed: true });
        report.added++;
      };
      for (const z of pc.zones) add(z.name, 'zone', undefined, z.coords);
      for (const m of pc.motionMasks) add(null, 'motion_mask', undefined, m.coords);
      for (const m of pc.objectMasks) add(null, 'object_filter_mask', m.objectType, m.coords);
    }
    this._notify();
    return report;
  }
};

function clamp01(v) { return Math.min(1, Math.max(0, v)); }

// migrateV1: maps v0.1 in-memory shapes ({mode:'object_mask', points:[{px,py,x,y}]})
// to schemaVersion 2. Kept for tooling/console use; v0.1 had no persistence.
function migrateV1(items, cameras) {
  const ws = {
    schemaVersion: 2,
    activeCameraId: 'default',
    cameras: (cameras || []).map(c => ({ id: 'cam_' + crypto.randomUUID(), ...c })),
    polygonsByCamera: { default: [] },
    imagesMeta: {},
    draft: { points: [], type: 'motion_mask' }
  };
  for (const it of items || []) {
    ws.polygonsByCamera.default.push({
      id: 'p_' + crypto.randomUUID(),
      name: it.name,
      type: it.mode === 'object_mask' ? 'object_filter_mask' : it.mode,
      objectType: it.objectType,
      points: it.points.map(p => ({ x: p.x, y: p.y })),
      closed: true
    });
  }
  return ws;
}

// ==================== PLATFORM (Electron swap boundary) ====================
const Platform = {
  readImageFile(file) {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(file);
    });
  },
  async copyText(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = Object.assign(document.createElement('textarea'), { value: text });
      document.body.append(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  },
  downloadFile(name, text) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([text], { type: 'text/yaml' }));
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

// ==================== VALIDATE (spec 02) ====================
const Validate = {
  NAME_RE: /^[a-z][a-z0-9_]*$/,
  polygonName(name, ws) {
    const issues = [];
    if (!name) issues.push({ level: 'error', field: 'name', message: 'Zone name is required.' });
    else if (!this.NAME_RE.test(name)) issues.push({ level: 'error', field: 'name', message: 'Use lowercase letters, digits, underscores; must start with a letter.' });
    if (name && ws.cameras.some(c => c.name === name)) issues.push({ level: 'error', field: 'name', message: 'A zone cannot share a camera’s name.' });
    return issues;
  },
  polygon(poly) {
    const issues = [];
    if (poly.points.length < 3) issues.push({ level: 'error', field: 'points', message: 'A polygon needs at least 3 points.' });
    if (poly.points.some(p => p.x < 0 || p.x > 1 || p.y < 0 || p.y > 1)) {
      issues.push({ level: 'warn', field: 'points', message: `“${poly.name}” has coordinates outside 0.0–1.0.` });
    }
    return issues;
  },
  cameraName(name, ws) {
    const issues = [];
    if (!name) issues.push({ level: 'error', field: 'camName', message: 'Camera name is required.' });
    else if (!this.NAME_RE.test(name)) issues.push({ level: 'error', field: 'camName', message: 'Use lowercase letters, digits, underscores; must start with a letter.' });
    if (name && ws.cameras.some(c => c.name === name)) issues.push({ level: 'error', field: 'camName', message: 'A camera with this name already exists.' });
    return issues;
  },
  // spec 07: warn (never block) when mask targets an object the camera doesn't track
  objectMaskTracked(objectType, ws) {
    const cam = ws.cameras.find(c => c.id === ws.activeCameraId);
    const tracked = cam && cam.trackedObjects;
    if (!tracked || !tracked.length || objectType === 'all') return [];
    if (!tracked.includes(objectType)) {
      return [{ level: 'warn', field: 'draw', message: `${objectType} mask drawn, but this camera does not track ${objectType}.` }];
    }
    return [];
  }
};

// ==================== TOAST (spec 02 — single-slot, 5s, undo) ====================
const Toast = {
  _timer: null,
  _undoFn: null,
  show(message, undoFn) {
    this._finalize();
    this._undoFn = undoFn || null;
    const el = document.getElementById('toast');
    el.querySelector('.toast-msg').textContent = message;
    el.querySelector('button').style.display = undoFn ? 'inline' : 'none';
    el.classList.add('visible');
    this._timer = setTimeout(() => this._finalize(), 5000);
  },
  undo() {
    if (this._undoFn) this._undoFn();
    this._finalize();
  },
  _finalize() {
    clearTimeout(this._timer);
    this._undoFn = null;
    document.getElementById('toast').classList.remove('visible');
  }
};

// ==================== PERSIST (spec 04 — sole owner of localStorage) ====================
const Persist = {
  KEY: 'fph.workspace.v2',
  _t: null,
  _warned: false,
  save(ws) {
    clearTimeout(this._t);
    this._t = setTimeout(() => {
      try {
        localStorage.setItem(this.KEY, JSON.stringify(ws));
      } catch (e) {
        if (!this._warned) {
          this._warned = true;
          Toast.show('Auto-save unavailable: ' + e.name);
        }
      }
    }, 500);
  },
  load() {
    let raw;
    try { raw = localStorage.getItem(this.KEY); } catch { return { ws: null }; }
    if (!raw) return { ws: null };
    try {
      const ws = JSON.parse(raw);
      if (ws.schemaVersion === 2) { // v2→v3 migration (spec 08)
        ws.schemaVersion = 3;
        ws.draftsByCamera = {};
      }
      if (ws.schemaVersion !== 3) throw new Error('unknown schema');
      ws.draftsByCamera ??= {};
      ws.yamlScope ??= 'camera';
      return { ws };
    } catch {
      this.clear(); // corrupt/unknown data is removed, not left to fail every load
      return { ws: null, discarded: true };
    }
  },
  clear() {
    clearTimeout(this._t); // cancel any pending debounced save so the key stays gone
    try { localStorage.removeItem(this.KEY); } catch {}
  }
};

// ==================== YAML ====================
const Yaml = {
  coordString(points) {
    return points.map(p => this._n(p.x) + ',' + this._n(p.y)).join(',');
  },
  _n(v) { return parseFloat(v.toFixed(3)); },

  DEFAULT_OBJECTS: ['person', 'car', 'dog', 'cat', 'bird', 'package'],

  // motion / objects / zones blocks at the given indent (spec 07/08)
  polygonBlocks(ws, camId, ind, trackedObjects, includeTrack) {
    const polys = ws.polygonsByCamera[camId] || [];
    const motionMasks = polys.filter(p => p.type === 'motion_mask');
    const objectMasks = polys.filter(p => p.type === 'object_filter_mask');
    const zones = polys.filter(p => p.type === 'zone');
    let out = '';

    if (motionMasks.length) {
      out += `${ind}motion:\n`;
      if (motionMasks.length === 1) {
        out += `${ind}  mask: "${this.coordString(motionMasks[0].points)}"\n`;
      } else {
        out += `${ind}  mask:\n`;
        for (const m of motionMasks) out += `${ind}    - ${this.coordString(m.points)}\n`;
      }
    }

    const emitTrack = includeTrack && trackedObjects && trackedObjects.length;
    if (objectMasks.length || emitTrack) {
      out += `${ind}objects:\n`;
      if (emitTrack) {
        out += `${ind}  track:\n`;
        for (const t of trackedObjects) out += `${ind}    - ${t}\n`;
      }
      if (objectMasks.length) {
        // spec 07: 'all' expands to every relevant type at emission time
        const universe = (trackedObjects && trackedObjects.length) ? trackedObjects : this.DEFAULT_OBJECTS;
        const byType = {};
        for (const m of objectMasks) {
          const targets = m.objectType === 'all' ? universe : [m.objectType];
          for (const t of targets) (byType[t] ??= []).push({ mask: m, fromAll: m.objectType === 'all' });
        }
        out += `${ind}  filters:\n`;
        for (const type of Object.keys(byType)) {
          out += `${ind}    ${type}:\n${ind}      mask:\n`;
          for (const e of byType[type]) {
            out += `${ind}        - ${this.coordString(e.mask.points)}${e.fromAll ? '  # from "all objects" mask' : ''}\n`;
          }
        }
      }
    }

    if (zones.length) {
      out += `${ind}zones:\n`;
      for (const z of zones) {
        out += `${ind}  ${z.name}:\n${ind}    coordinates: ${this.coordString(z.points)}\n`;
      }
    }
    return out;
  },

  _trackedFor(ws, camId) {
    const cam = ws.cameras.find(c => c.id === camId);
    return cam && cam.trackedObjects && cam.trackedObjects.length ? cam.trackedObjects : null;
  },

  // 'This camera' scope: polygons only — paste into an existing camera block
  cameraSnippet(ws, camId) {
    return this.polygonBlocks(ws, camId, '', this._trackedFor(ws, camId), false).trim();
  },

  // 'All cameras' scope: complete cameras: block with nested polygons
  fullConfig(ws) {
    if (!ws.cameras.length) return '';
    let out = 'cameras:\n';
    for (const c of ws.cameras) {
      out += `  ${c.name}:\n`;
      out += '    ffmpeg:\n      inputs:\n';
      out += '        - path: ' + c.input + '\n';
      out += '          roles:\n';
      for (const r of c.roles) out += `            - ${r}\n`;
      out += '    detect:\n';
      out += `      width: ${c.width}\n      height: ${c.height}\n      fps: ${c.fps}\n`;
      out += this.polygonBlocks(ws, c.id, '    ', c.trackedObjects, true);
      out += '\n';
    }
    const orphans = (ws.polygonsByCamera.default || []).length;
    if (orphans) out += `# Note: ${orphans} item(s) on the "default" tab are not assigned to a camera and are excluded.\n`;
    return out.trim();
  }
};

// ==================== IMPORTER (spec 06 — pure parse, no Store access) ====================
const Importer = {
  parse(text) {
    let doc;
    try { doc = jsyaml.load(text); } catch (e) { return { error: 'YAML parse failed: ' + e.message }; }
    if (!doc || typeof doc !== 'object') return { error: 'No YAML mapping found.' };
    // full config: camera entries PLUS any top-level (global) zones/motion/objects blocks
    const cams = doc.cameras && typeof doc.cameras === 'object'
      ? [...Object.entries(doc.cameras), ['(snippet)', { zones: doc.zones, motion: doc.motion, objects: doc.objects }]]
      : [['(snippet)', doc]];
    const out = { cameras: [], warnings: [] };
    for (const [name, cfg] of cams) {
      if (!cfg || typeof cfg !== 'object') continue;
      const cam = { name, zones: [], motionMasks: [], objectMasks: [], settings: this._settings(cfg) };
      for (const [zName, z] of Object.entries(cfg.zones || {})) {
        cam.zones.push({ name: zName, coords: this._coords(z && z.coordinates, out.warnings, 'zone ' + zName) });
      }
      for (const m of this._asList(cfg.motion && cfg.motion.mask)) {
        cam.motionMasks.push({ coords: this._coords(m, out.warnings, 'motion mask') });
      }
      for (const [oType, f] of Object.entries((cfg.objects && cfg.objects.filters) || {})) {
        for (const m of this._asList(f && f.mask)) {
          cam.objectMasks.push({ objectType: oType, coords: this._coords(m, out.warnings, oType + ' mask') });
        }
      }
      if (cam.zones.length || cam.motionMasks.length || cam.objectMasks.length) out.cameras.push(cam);
    }
    if (!out.cameras.length) return { error: 'No zones or masks found under cameras.*, zones, motion.mask, or objects.filters.' };
    return out;
  },
  _settings(cfg) {
    const input = cfg.ffmpeg && Array.isArray(cfg.ffmpeg.inputs) ? cfg.ffmpeg.inputs[0] : null;
    const detect = cfg.detect || {};
    // coerce types from arbitrary YAML — imported values flow into the DOM and YAML output
    const roles = input && input.roles;
    return {
      input: input && input.path != null ? String(input.path) : null,
      roles: Array.isArray(roles) ? roles.map(String) : roles != null ? [String(roles)] : null,
      width: Number(detect.width) || null,
      height: Number(detect.height) || null,
      fps: Number(detect.fps) || null,
      track: (cfg.objects && Array.isArray(cfg.objects.track)) ? cfg.objects.track.map(String) : null
    };
  },
  _asList(v) { return v == null ? [] : Array.isArray(v) ? v : [v]; },
  _coords(v, warnings, label) {
    if (Array.isArray(v)) v = v.join(','); // list-of-pairs form
    const nums = String(v ?? '').split(',').map(s => Number(String(s).trim()));
    if (nums.length < 6 || nums.length % 2 || nums.some(isNaN)) {
      warnings.push(`Skipped ${label}: malformed coordinates`);
      return null;
    }
    const pts = [];
    for (let i = 0; i < nums.length; i += 2) pts.push({ x: nums[i], y: nums[i + 1] });
    // whole-polygon classification: any value > 1.001 → legacy pixel space
    return { points: pts, pixelSpace: nums.some(n => n > 1.001) };
  }
};

// ==================== VIEW ====================
const View = {
  canvas: null,
  ctx: null,

  init() {
    this.canvas = document.getElementById('editorCanvas');
    this.ctx = this.canvas.getContext('2d');
  },

  render(ws) {
    this.renderCameraTabs(ws);
    this.renderCanvas(ws);
    this.renderItemList(ws);
    this.renderCamList(ws);
    this.renderYaml(ws);
    this.renderNative(ws);
  },

  // spec 09: native-only affordances; hidden entirely in plain browsers
  renderNative(ws) {
    const btn = document.getElementById('grabFrameBtn');
    const cam = ws.cameras.find(c => c.id === ws.activeCameraId);
    btn.style.display = (window.dinghyNative && cam && /^rtsps?:\/\//i.test(cam.input)) ? 'block' : 'none';
  },

  // spec 08: camera tab strip — renders purely from state
  renderCameraTabs(ws) {
    const strip = document.getElementById('camTabs');
    const tabs = ws.cameras.map(c => ({ id: c.id, label: c.name }));
    if ((ws.polygonsByCamera.default || []).length || ws.activeCameraId === 'default') {
      tabs.unshift({ id: 'default', label: 'default' });
    }
    const show = ws.cameras.length > 0;
    strip.classList.toggle('visible', show);
    if (!show) return;
    strip.innerHTML = tabs.map(t =>
      `<button class="cam-tab ${t.id === ws.activeCameraId ? 'active' : ''}" data-cam="${t.id}">${esc(t.label)}</button>`
    ).join('') + '<button class="cam-tab add" data-cam="__add">+ Camera</button>';
  },

  activeImage(ws) { return Images[ws.activeCameraId] || null; },

  renderCanvas(ws) {
    const im = this.activeImage(ws);
    const placeholder = document.getElementById('placeholder');
    if (!im) {
      this.canvas.style.display = 'none';
      placeholder.style.display = 'block';
      // spec 04: restored workspace — prompt re-upload by name, polygons already loaded
      const meta = ws.imagesMeta[ws.activeCameraId];
      if (meta) {
        placeholder.innerHTML = `<p>Re-upload the background image</p>
          <p class="hint">Previous image: ${esc(meta.filename || 'pasted image')} (${meta.w}×${meta.h}) — your polygons are restored and will appear once an image is loaded</p>`;
      } else {
        placeholder.innerHTML = `<p>Upload an image to start</p>
          <p class="hint">Drag &amp; drop, or paste a frame from your camera feed</p>`;
      }
      return;
    }
    placeholder.style.display = 'none';
    this.canvas.style.display = 'block';
    if (this.canvas.width !== im.w) this.canvas.width = im.w;
    if (this.canvas.height !== im.h) this.canvas.height = im.h;
    const ctx = this.ctx;
    ctx.clearRect(0, 0, im.w, im.h);
    ctx.drawImage(im.img, 0, 0);

    for (const poly of ws.polygonsByCamera[ws.activeCameraId] || []) {
      this._drawPolygon(ctx, poly, im);
    }
    this._drawDraft(ctx, ws.draft, im);
  },

  _px(p, im) { return { px: p.x * im.w, py: p.y * im.h }; },

  _drawPolygon(ctx, poly, im) {
    const pts = poly.points.map(p => this._px(p, im));
    if (pts.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(pts[0].px, pts[0].py);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].px, pts[i].py);
    if (poly.closed) ctx.closePath();
    const color = poly.type === 'zone' ? 'rgba(63,185,80,0.9)' : 'rgba(248,81,73,0.9)';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    if (poly.closed) {
      ctx.fillStyle = poly.type === 'zone' ? 'rgba(63,185,80,0.12)' : 'rgba(248,81,73,0.12)';
      ctx.fill();
    }
    pts.forEach((p, i) => {
      const hot = Pointer.hover && Pointer.hover.polyId === poly.id && Pointer.hover.index === i;
      this._drawHandle(ctx, p.px, p.py, color, hot);
    });
    if (poly.closed && pts.length) {
      ctx.fillStyle = color;
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(poly.name || 'unnamed', pts[0].px + 8, pts[0].py - 8);
    }
  },

  _drawDraft(ctx, draft, im) {
    const pts = draft.points.map(p => this._px(p, im));
    if (!pts.length) return;
    ctx.beginPath();
    ctx.moveTo(pts[0].px, pts[0].py);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].px, pts[i].py);
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    for (const p of pts) this._drawHandle(ctx, p.px, p.py, '#58a6ff');
    if (pts.length > 2) {
      ctx.fillStyle = 'rgba(88,166,255,0.85)';
      ctx.font = '11px sans-serif';
      ctx.fillText('Click first point to close', pts[0].px + 8, pts[0].py - 8);
    }
  },

  _drawHandle(ctx, px, py, color, hot) {
    ctx.beginPath();
    ctx.arc(px, py, hot ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = hot ? '#58a6ff' : '#fff'; // spec 05: hovered vertex highlights
    ctx.fill();
    ctx.strokeStyle = hot ? '#fff' : color;
    ctx.lineWidth = 2;
    ctx.stroke();
  },

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ==================== CANVAS INTERACTION ====================
function toImageSpace(e) {
  const canvas = View.canvas;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    mx: (e.clientX - rect.left) * scaleX,
    my: (e.clientY - rect.top) * scaleY,
    scale: rect.width / canvas.width // display scale factor
  };
}

// ---- spec 05: hit testing (thresholds in display px, converted via scale) ----
const HIT = { VERTEX_PX: 8, EDGE_PX: 6, CLOSE_PX: 20 };

function vertexAt(mx, my, ws, scale, im) {
  const polys = ws.polygonsByCamera[ws.activeCameraId] || [];
  const r = HIT.VERTEX_PX / scale;
  for (let i = polys.length - 1; i >= 0; i--) { // topmost (last-rendered) wins
    const hit = polys[i].points.findIndex(p => Math.hypot(p.x * im.w - mx, p.y * im.h - my) <= r);
    if (hit !== -1) return { polyId: polys[i].id, index: hit };
  }
  return null;
}

function edgeAt(mx, my, ws, scale, im) {
  const polys = ws.polygonsByCamera[ws.activeCameraId] || [];
  const r = HIT.EDGE_PX / scale;
  for (let i = polys.length - 1; i >= 0; i--) {
    const pts = polys[i].points;
    for (let j = 0; j < pts.length; j++) {
      const a = { x: pts[j].x * im.w, y: pts[j].y * im.h };
      const bIdx = (j + 1) % pts.length;
      const b = { x: pts[bIdx].x * im.w, y: pts[bIdx].y * im.h };
      const d = pointToSegment(mx, my, a, b);
      if (d.dist <= r) {
        return { polyId: polys[i].id, insertIndex: j + 1, x: d.x / im.w, y: d.y / im.h };
      }
    }
  }
  return null;
}

function pointToSegment(px, py, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx * dx + dy * dy;
  const t = len2 ? clamp01(((px - a.x) * dx + (py - a.y) * dy) / len2) : 0;
  const x = a.x + t * dx, y = a.y + t * dy;
  return { dist: Math.hypot(px - x, py - y), x, y };
}

// ---- spec 05: pointer state machine (vertex > edge > draft point priority) ----
const Pointer = { dragging: false, moved: false, pendingDraft: null, _raf: null, _next: null, hover: null, _hoverKey: null };
const editorCanvas = document.getElementById('editorCanvas');

editorCanvas.addEventListener('mousedown', e => {
  const im = Images[Store.state.activeCameraId];
  if (!im) return;
  const { mx, my, scale } = toImageSpace(e);
  const v = vertexAt(mx, my, Store.state, scale, im);
  if (v) {
    Store.beginDrag(v.polyId, v.index);
    Pointer.dragging = true;
    Pointer.moved = false;
    return;
  }
  const edge = edgeAt(mx, my, Store.state, scale, im);
  if (edge) {
    Store.insertPoint(edge.polyId, edge.insertIndex, edge.x, edge.y);
    Store.beginDrag(edge.polyId, edge.insertIndex);
    Pointer.dragging = true;
    Pointer.moved = false;
    return;
  }
  Pointer.pendingDraft = { mx, my };
});

editorCanvas.addEventListener('mousemove', e => {
  const im = Images[Store.state.activeCameraId];
  if (!im) return;
  const { mx, my, scale } = toImageSpace(e);
  if (Pointer.dragging) {
    Pointer.moved = true;
    // rAF-throttled live drag: YAML + canvas update per frame
    Pointer._next = { x: mx / im.w, y: my / im.h };
    if (!Pointer._raf) {
      Pointer._raf = requestAnimationFrame(() => {
        Pointer._raf = null;
        if (Pointer._next && Pointer.dragging) Store.dragTo(Pointer._next.x, Pointer._next.y);
      });
    }
    return;
  }
  // hover affordance + vertex highlight (spec 05)
  const hv = vertexAt(mx, my, Store.state, scale, im);
  const key = hv ? hv.polyId + ':' + hv.index : null;
  if (key !== Pointer._hoverKey) {
    Pointer._hoverKey = key;
    Pointer.hover = hv;
    View.renderCanvas(Store.state);
  }
  editorCanvas.style.cursor = hv ? 'grab'
    : edgeAt(mx, my, Store.state, scale, im) ? 'copy' : 'crosshair';
});

editorCanvas.addEventListener('mouseleave', () => {
  if (Pointer._hoverKey) {
    Pointer._hoverKey = null;
    Pointer.hover = null;
    View.renderCanvas(Store.state);
  }
});

window.addEventListener('mouseup', e => {
  if (Pointer.dragging) {
    Pointer.dragging = false;
    if (Pointer._raf) { cancelAnimationFrame(Pointer._raf); Pointer._raf = null; }
    // commit the final position even if the queued animation frame never fired
    if (Pointer._next) Store.dragTo(Pointer._next.x, Pointer._next.y);
    Pointer._next = null;
    Store.endDrag();
    return;
  }
  if (!Pointer.pendingDraft) return;
  const start = Pointer.pendingDraft;
  Pointer.pendingDraft = null;
  if (e.target !== editorCanvas) return;
  const im = Images[Store.state.activeCameraId];
  if (!im) return;
  const { mx, my, scale } = toImageSpace(e);
  if (Math.hypot(mx - start.mx, my - start.my) > HIT.VERTEX_PX / scale) return; // it was a drag gesture, not a click
  const draft = Store.state.draft;
  // close when clicking near the first draft point (20px display space)
  if (draft.points.length > 2) {
    const first = draft.points[0];
    if (Math.hypot(mx - first.x * im.w, my - first.y * im.h) < HIT.CLOSE_PX / scale) {
      UI.finishPolygon();
      return;
    }
  }
  Store.addPoint(mx / im.w, my / im.h);
});

// dblclick vertex → delete (min 3 points enforced with inline warning)
editorCanvas.addEventListener('dblclick', e => {
  const im = Images[Store.state.activeCameraId];
  if (!im) return;
  const { mx, my, scale } = toImageSpace(e);
  const v = vertexAt(mx, my, Store.state, scale, im);
  if (!v) return;
  const result = Store.deleteVertex(v.polyId, v.index);
  if (result.error === 'min_points') View.showFieldError('drawError', 'A polygon needs at least 3 points.');
});

// ---- spec 05: keyboard shortcuts (focus-guarded) ----
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (Store.state.draft.points.length) Store.undoPoint();
    else Store.undoLastMove();
  } else if (e.key === 'Escape') {
    if (Pointer.dragging) {
      Pointer.dragging = false;
      if (Pointer._raf) { cancelAnimationFrame(Pointer._raf); Pointer._raf = null; }
      Pointer._next = null;
      Store.cancelDrag();
    } else {
      Store.clearCurrent();
    }
  } else if (e.key === 'Enter') {
    if (document.getElementById('panel-editor').classList.contains('active') && Store.state.draft.points.length) {
      UI.finishPolygon();
    }
  }
});

// ---- spec 03: image paste from clipboard ----
document.addEventListener('paste', async e => {
  if (!document.getElementById('panel-editor').classList.contains('active')) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return; // let text paste through
  const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (!item) return;
  e.preventDefault();
  const prev = Store.snapshotImage();
  const dataUrl = await Platform.readImageFile(item.getAsFile());
  Store.setImage(dataUrl, { filename: 'pasted image' });
  if (prev) Toast.show('Image replaced', () => Store.restoreImage(prev));
});

// ---- spec 10: ONVIF discovery panel (native-only, transient UI state by design) ----
const OnvifUI = {
  devices: [],

  _slug(s) {
    let out = String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    if (!out) out = 'camera';
    if (!/^[a-z]/.test(out)) out = 'cam_' + out;
    return out;
  },
  _injectCreds(uri, user, pass) {
    if (!user) return uri;
    return uri.replace(/^(rtsps?:\/\/)/i, m => m + encodeURIComponent(user) + ':' + encodeURIComponent(pass || '') + '@');
  },

  async discover() {
    if (!window.dinghyNative) return;
    const btn = document.getElementById('discoverBtn');
    btn.disabled = true;
    btn.textContent = 'Discovering… (4s probe)';
    const res = await dinghyNative.discoverCameras();
    btn.disabled = false;
    btn.textContent = '📡 Discover Cameras (ONVIF)';
    const wrap = document.getElementById('onvifResults');
    if (res.error) { wrap.innerHTML = `<div class="field-warn visible">${esc(res.error)}</div>`; return; }
    this.devices = (res.devices || []).map(d => ({ ...d, info: null }));
    if (!this.devices.length) {
      wrap.innerHTML = '<div class="field-warn visible">No ONVIF cameras responded. Check the camera is on this network (and that ONVIF is enabled on it), or add it manually below.</div>';
      return;
    }
    this.render();
  },

  // Credentials are never copied into JS state: they live only in the visible
  // input fields (user-controlled) and are read at click time per call.
  _creds(i) {
    return {
      user: document.getElementById(`onvifUser${i}`).value.trim(),
      pass: document.getElementById(`onvifPass${i}`).value
    };
  },

  async connect(i) {
    const d = this.devices[i];
    const { user, pass } = this._creds(i);
    const btn = document.getElementById(`onvifConnect${i}`);
    const errEl = document.getElementById(`onvifErr${i}`);
    btn.disabled = true;
    btn.textContent = '…';
    errEl.classList.remove('visible');
    const res = await dinghyNative.getCameraStreams({ address: d.address, port: d.port, username: user, password: pass });
    btn.disabled = false;
    btn.textContent = 'Connect';
    if (res.error) {
      errEl.textContent = res.error;
      errEl.classList.add('visible');
      return;
    }
    d.info = res;
    // inject profiles into this device's row only — creds inputs stay untouched
    document.getElementById(`onvifProfiles${i}`).innerHTML = `
      <div class="item-type" style="margin-top:0.3rem">${esc(res.manufacturer || '')} ${esc(res.model || '')}</div>
      ${res.profiles.map((p, pi) => `
        <div style="display:flex;gap:0.4rem;align-items:center;margin-top:0.3rem">
          <span class="item-type" style="flex:1">${esc(p.name)}${p.width ? ` ${p.width}×${p.height}` : ''}${p.fps ? ` @${Math.round(p.fps)}fps` : ''}</span>
          ${p.rtsp ? `<button class="btn btn-sm" onclick="OnvifUI.use(${i},${pi})">Use</button>` : '<span class="item-type">no RTSP</span>'}
        </div>`).join('')}`;
  },

  use(di, pi) {
    const d = this.devices[di];
    const p = d.info.profiles[pi];
    if (!p.rtsp) return;
    const { user, pass } = this._creds(di); // read live, not from storage
    document.getElementById('camName').value = this._slug(d.info.model || d.name || d.hardware);
    document.getElementById('camInput').value = this._injectCreds(p.rtsp, user, pass);
    if (p.width) document.getElementById('camWidth').value = p.width;
    if (p.height) document.getElementById('camHeight').value = p.height;
    if (p.fps) document.getElementById('camFps').value = Math.round(p.fps);
    document.getElementById('roleDetect').checked = true;
    // record pre-checks only on the device's highest-resolution profile
    const maxRes = Math.max(...d.info.profiles.map(x => (x.width || 0) * (x.height || 0)));
    document.getElementById('roleRecord').checked = (p.width || 0) * (p.height || 0) === maxRes && maxRes > 0;
    Toast.show(`Filled form from ${esc(p.name)} — review and click Add Camera`);
  },

  render() {
    const wrap = document.getElementById('onvifResults');
    wrap.innerHTML = this.devices.map((d, i) => `
      <div class="item" style="flex-direction:column;align-items:stretch;cursor:default">
        <div>
          <div class="item-name">${esc(d.name || d.hardware || 'ONVIF device')}</div>
          <div class="item-type">${esc(d.address)}:${esc(d.port)}${d.hardware && d.name ? ' · ' + esc(d.hardware) : ''}</div>
        </div>
        <div style="display:flex;gap:0.4rem;margin-top:0.4rem">
          <input type="text" id="onvifUser${i}" placeholder="user" style="flex:1" autocomplete="off">
          <input type="password" id="onvifPass${i}" placeholder="password" style="flex:1" autocomplete="off">
          <button class="btn btn-sm" id="onvifConnect${i}" onclick="OnvifUI.connect(${i})">Connect</button>
        </div>
        <div class="field-error" id="onvifErr${i}"></div>
        <div id="onvifProfiles${i}"></div>
      </div>`).join('');
  }
};

// ---- spec 09: Electron menu wiring (no-op in plain browsers) ----
if (window.dinghyNative) {
  dinghyNative.onMenu(action => {
    if (action === 'open-config') UI.openConfigNative();
    else if (action === 'save-config') UI.saveConfigNative(false);
    else if (action === 'save-config-as') UI.saveConfigNative(true);
    else if (action === 'export-yaml') UI.downloadYaml();
  });
  document.getElementById('onvifWrap').style.display = 'block';

  // startup ffmpeg check — saves the "why doesn't Grab Frame work" support question
  (async () => {
    const res = await dinghyNative.checkFfmpeg();
    const el = document.getElementById('ffmpegStatus');
    if (res.found) {
      el.innerHTML = `<span style="color:var(--success)">✓ FFmpeg detected${res.version ? ' (' + esc(res.version) + ')' : ''}</span>`;
    } else {
      const hints = {
        win32: 'winget install Gyan.FFmpeg',
        darwin: 'brew install ffmpeg',
        linux: 'sudo apt install ffmpeg'
      };
      el.innerHTML = `<span style="color:var(--warning)">⚠ FFmpeg not found — RTSP frame grabs unavailable.<br>` +
        `Install with: <code>${esc(hints[res.platform] || 'see ffmpeg.org/download')}</code></span>`;
    }
    el.style.display = 'block';
  })();
}

// ==================== INIT ====================
View.init();
Store.subscribe(ws => View.render(ws));
Store.subscribe(ws => Persist.save(ws));

// spec 04: restore persisted workspace (polygons/cameras/draft; images re-uploaded on prompt)
const _loaded = Persist.load();
const _saved = _loaded.ws;
if (_loaded.discarded) Toast.show('Stored workspace was unreadable and has been cleared.');
if (_saved) {
  Store.state = _saved;
  document.getElementById('drawMode').value = _saved.draft.type || 'motion_mask';
}
UI.changeMode.call(UI);
if (_saved) {
  Store.state.draft.type = _saved.draft.type;
  Store.state.draft.points = _saved.draft.points || [];
  Store._notify();
}
</script>
</body>
</html>
